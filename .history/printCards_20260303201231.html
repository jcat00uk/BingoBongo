<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Cards PDF Generator</title>
<style>
body { font-family: Arial, sans-serif; margin: 10px; }
h2 { text-align: center; margin-bottom: 12px; }

#controls { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
#controls label { font-size: 14px; }
#controls input, #controls select { margin-left: 4px; padding: 2px 4px; font-size: 14px; }
button { padding: 6px 12px; font-size: 14px; cursor: pointer; }

#pagePreview { margin-top: 12px; display: flex; justify-content: center; }

#pagePreview {
  display: flex;
  justify-content: center;
  margin-top: 12px;
}



/* ===== BASE SHARED CARD STYLES FOR PDF MATCH ===== */
.cardPreview {
  display: grid;
  grid-template-rows: 20% 80%;
  justify-items: center;
  align-items: center;
  box-sizing: border-box;
  width: 100%;
  height: 100%;
}

.cardPreview table {
  width: 100%;
  height: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.cardPreview td {
  text-align: center;
  vertical-align: middle;
  font-weight: bold;
}

/* --- STYLE DEFINITIONS MATCHING PDF --- */
const pdfStyleMap = {
  plain: {
    bg: [255,255,255], cardBorder: [0,0,0], grid: [0,0,0], text: [0,0,0], radius: 0
  },
  christmas: {
    bg: [255,253,245], cardBorder: [179,0,0], grid: [31,122,31], text: [0,51,0], radius: 10
  },
  easter: {
    bg: [255,246,251], // use gradient start color as closest match
    cardBorder: [217,167,199], grid: [159,211,199], text: [51,51,51], radius: 14
  },
  neon: {
    bg: [4,68,105], // exact match to #044469
    cardBorder: [0,255,255], grid: [0,255,255], text: [255,255,255], radius: 12
  },
  halloween: {
    bg: [51,51,51], // exact match to #333333
    cardBorder: [255,122,0], grid: [255,122,0], text: [255,255,204], radius: 12
  },
  retro: {
    bg: [253,246,227], cardBorder: [107,79,44], grid: [107,79,44], text: [59,42,26], radius: 8
  },
  gold: {
    bg: [255,255,255], cardBorder: [201,162,39], grid: [0,0,0], text: [0,0,0], radius: 10
  },
  kids: {
    bg: [255,255,255], cardBorder: [255,111,145], grid: [110,198,255], text: [51,51,51], radius: 16
  },
  minimal: {
    bg: [247,247,247], cardBorder: [204,204,204], grid: [221,221,221], text: [34,34,34], radius: 0
  },
  casino: {
    bg: [22,68,55], // exact match to #164437
    cardBorder: [212,175,55], grid: [255,255,255], text: [255,255,204], radius: 12
  }
};



</style>
<style>
/* --- CENTERED CONTROLS --- */
#controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

#controls label {
  font-size: 20px;
  text-align: center;
}

#controls input,
#controls select {
  margin-left: 6px;
  padding: 10px 12px;
  font-size: 18px;
  border-radius: 6px;
}

button {
  padding: 14px 20px;
  font-size: 20px;
  border-radius: 6px;
  cursor: pointer;
}

/* --- MOBILE SPECIFIC --- */
@media (max-width: 768px) {
  #controls {
    flex-direction: column;
    align-items: center;
  }

  #controls label {
    width: 100%;
    text-align: center;
    font-size: 40px;
  }

  #controls input,
  #controls select,
  button {
    width: 95%;
    max-width: 360px;
    font-size: 40x;
    padding: 14px 16px;
  }


}
#pagePreviewWrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
  overflow: auto;
  position: relative;
}

.pageGrid {
  display: grid;
  border: 1px solid #666;
  background: #fff;
  box-sizing: border-box;
  padding: 6px;
  gap: 6px;

  width: 95vw;        /* responsive width */
  max-width: 1000px; /* desktop cap */
  margin: auto;
}

/* Portrait A4 */
.pageGrid.portrait {
  aspect-ratio: 210 / 297;
}

/* Landscape A4 */
.pageGrid.landscape {
  aspect-ratio: 297 / 210;
}




/* ===== BASE SHARED CARD STYLES ===== */
.style-plain {
  background: #ffffff;
  border: 1px solid #000;
}

.style-plain td {
  border: 1px solid #000;
  color: #000;
}


.style-christmas {
  background: #fffdf5;
  border: 2px solid #b30000;
  border-radius: 0px;
}

.style-christmas > div:first-child {
  color: #b30000;
}

.style-christmas td {
  border: 1px solid #1f7a1f;
  color: #003300;
}

.style-easter {
  background: linear-gradient(135deg, #fff6fb, #f0fff4);
  border: 2px solid #d9a7c7;
  border-radius: 0px;
}

.style-easter > div:first-child {
  color: #7a4b94;
}

.style-easter td {
  border: 1px solid #9fd3c7;
  color: #333;
  border-radius: 0px;
}

/* Neon: keep the vibrant border but use darker text background for readability */
.style-neon {
  background: #044469; /* slightly lighter than pure black */
  border: 2px solid #00ffff;
  border-radius: 0px;
}
.style-neon td {
  border: 1px solid #00ffff;
  color: #ffffff; /* white for high contrast */
  text-shadow: none;
}
.style-neon > div:first-child {
  color: #9e9e9e;
}


/* Halloween: lighten background and use darker numbers */
.style-halloween {
  background: #333333; /* lighter than #1a1a1a */
  border: 2px solid #ff7a00;
  border-radius: 0px;
}
.style-halloween td {
  border: 1px solid #ff7a00;
  color: #ffffcc; /* soft yellow for easier reading */
}

.style-halloween > div:first-child {
  color: #b266ff;
}
.style-retro {
  background: #fdf6e3;
  border: 2px solid #6b4f2c;
  border-radius: 0px;
}

.style-retro > div:first-child {
  color: #c47a2c;
}

.style-retro td {
  border: 1px solid #6b4f2c;
  color: #3b2a1a;
}

.style-gold {
  background: #ffffff;
  border: 3px solid #c9a227;
  border-radius: 0px;
}

.style-gold > div:first-child {
  color: #8c6d1f;
}

.style-gold td {
  border: 1px solid #000;
  color: #000;
}
.style-kids {
  background: #ffffff;
  border: 2px solid #ff6f91;
  border-radius: 0px;
}

.style-kids > div:first-child {
  color: #ff6f91;
}

.style-kids td {
  border: 2px solid #6ec6ff;
  color: #333;
  border-radius: 0px;
}

.style-minimal {
  background: #f7f7f7;
  border: 1px solid #ccc;
}

.style-minimal > div:first-child {
  color: #444;
}

.style-minimal td {
  border: 1px solid #ddd;
  color: #222;
}

/* Casino: lighten background for readability */
.style-casino {
  background: #164437; /* darker green but not black */
  border: 2px solid #d4af37;
  border-radius: 0px;
}
.style-casino td {
  border: 1px solid #ffffff;
  color: #ffffcc; /* soft yellow instead of pure white */
}

.style-casino > div:first-child {
  color: #d4af37;
}


 /* styles */

</style>

</head>
<body>

<h2>Bingo Cards PDF Generator</h2>

<div id="controls">
  <label>Card Layout:
<select id="cardLayout">
  <option value="1x2">1×2 (large cards)</option>
  <option value="2x3">2×3</option>
  <option value="2x5">2×5 (portrait)</option> <!-- NEW -->
  <option value="3x4">3×4</option>
  <option value="4x5">4×5</option>
</select>
  </label>

<label>Style:
  <select id="styleSelect">
    <option value="plain">Plain</option>
    <option value="christmas">Christmas</option>
    <option value="easter">Easter</option>
    <option value="neon">Neon</option>
    <option value="halloween">Halloween</option>
    <option value="retro">Retro</option>
    <option value="gold">Gold</option>
    <option value="kids">Kids</option>
    <option value="minimal">Minimal</option>
    <option value="casino">Casino</option>
  </select>
</label>

  <label>Order:
    <select id="orderSelect">
      <option value="sequential">Sequential</option>
      <option value="random">Random</option>
    </select>
  </label>

 <label id="pagesLabel" style="display:none;">Number of Pages:
  <select id="numPages"></select>
</label>

  <label id="rangeLabel" style="display:none;">
    Page Range: <input type="number" id="pageStart" placeholder="Start" min="1" style="width:50px;"> - 
    <input type="number" id="pageEnd" placeholder="End" min="1" style="width:50px;">
  </label>

  <button id="previewBtn" disabled>Preview</button>
  <button id="downloadPDF" disabled>Download PDF</button>
</div>

<div id="pagePreviewWrapper">
  <div id="pagePreview"></div>
</div>

<script src="cards.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let finalCardOrder = [];
let totalPages = 1;
let cardCols = 3, cardRows = 4;

const layoutSelect = document.getElementById('cardLayout');
const orderSelect = document.getElementById('orderSelect');
const pagesLabel = document.getElementById('pagesLabel');
const rangeLabel = document.getElementById('rangeLabel');
const previewBtn = document.getElementById('previewBtn');
const downloadBtn = document.getElementById('downloadPDF');
const numPagesInput = document.getElementById('numPages');
const pageStartInput = document.getElementById('pageStart');
const pageEndInput = document.getElementById('pageEnd');
const styleSelect = document.getElementById('styleSelect');

// --- PDF style map ---
const pdfStyleMap = {
  plain: {
    bg: [255,255,255], cardBorder: [0,0,0], grid: [0,0,0], text: [0,0,0], radius: 0
  },
  christmas: {
    bg: [255,253,245], cardBorder: [179,0,0], grid: [31,122,31], text: [0,51,0], radius: 10
  },
  easter: {
    bg: [255,246,251], cardBorder: [217,167,199], grid: [159,211,199], text: [51,51,51], radius: 14
  },
  neon: {
    bg: [4,68,105], cardBorder: [0,255,255], grid: [0,255,255], text: [255,255,255], radius: 12
  },
  halloween: {
    bg: [51,51,51], cardBorder: [255,122,0], grid: [255,122,0], text: [255,255,204], radius: 12
  },
  retro: {
    bg: [253,246,227], cardBorder: [107,79,44], grid: [107,79,44], text: [59,42,26], radius: 8
  },
  gold: {
    bg: [255,255,255], cardBorder: [201,162,39], grid: [0,0,0], text: [0,0,0], radius: 10
  },
  kids: {
    bg: [255,255,255], cardBorder: [255,111,145], grid: [110,198,255], text: [51,51,51], radius: 16
  },
  minimal: {
    bg: [247,247,247], cardBorder: [204,204,204], grid: [221,221,221], text: [34,34,34], radius: 0
  },
  casino: {
    bg: [22,68,55], cardBorder: [212,175,55], grid: [255,255,255], text: [255,255,204], radius: 12
  }
};

// --- INITIAL LOAD ---
window.addEventListener('DOMContentLoaded', () => {
  layoutSelect.value = '3x4';
  [cardCols, cardRows] = layoutSelect.value.split('x').map(Number);
  orderSelect.value = 'random';      // default to random
  orderSelect.dispatchEvent(new Event('change'));
  previewBtn.disabled = false;       // enable preview
  downloadBtn.disabled = false;      // enable download
  renderPreview();                   // render preview immediately
});

// --- LAYOUT CHANGE ---
layoutSelect.addEventListener('change', () => {
  if (!layoutSelect.value) return;

  [cardCols, cardRows] = layoutSelect.value.split('x').map(Number);

  const cardsObj = window.cards;
  const cardsPerPage = cardCols * cardRows;
  totalPages = Math.ceil(Object.keys(cardsObj).length / cardsPerPage);

  if (orderSelect.value === 'sequential') {
    // Show range, hide random pages
    rangeLabel.style.display = 'inline-block';
    pagesLabel.style.display = 'none';

    // Update max values
    pageStartInput.max = totalPages;
    pageEndInput.max = totalPages;

    // Clamp current values
    if (parseInt(pageStartInput.value) > totalPages) pageStartInput.value = totalPages;
    if (parseInt(pageEndInput.value) > totalPages) pageEndInput.value = totalPages;

    // Default to full range if empty
    if (!pageStartInput.value) pageStartInput.value = 1;
    if (!pageEndInput.value) pageEndInput.value = totalPages;

  } else if (orderSelect.value === 'random') {
    // Random pages
    rangeLabel.style.display = 'none';
    pagesLabel.style.display = 'inline-block';
    populatePageSelect(); // rebuild dropdown
  }

  renderPreview();
});

function updatePageControls() {
  const cardsObj = window.cards;
  const cardsPerPage = cardCols * cardRows;
  totalPages = Math.ceil(Object.keys(cardsObj).length / cardsPerPage);

  if (orderSelect.value === 'sequential') {
    // Sequential: show range inputs
    rangeLabel.style.display = 'inline-block';
    pagesLabel.style.display = 'none';

    // Update max values
    pageStartInput.max = totalPages;
    pageEndInput.max = totalPages;

    // Clamp current values
    if (parseInt(pageStartInput.value) > totalPages) pageStartInput.value = totalPages;
    if (parseInt(pageEndInput.value) > totalPages) pageEndInput.value = totalPages;

    // Default to full range if empty
    if (!pageStartInput.value) pageStartInput.value = 1;
    if (!pageEndInput.value) pageEndInput.value = totalPages;

  } else if (orderSelect.value === 'random') {
    // Random: show number of pages dropdown
    rangeLabel.style.display = 'none';
    pagesLabel.style.display = 'inline-block';
    populatePageSelect();
  }
}

function populatePageSelect() {
  const cardsObj = window.cards;
  const cardsPerPage = cardCols * cardRows;
  const maxPages = Math.ceil(Object.keys(cardsObj).length / cardsPerPage);

  numPagesInput.innerHTML = '';

  for (let i = 1; i <= maxPages; i++) {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = i;
    numPagesInput.appendChild(option);
  }

  // Default to 1 (user can change)
  numPagesInput.value = 1;
}

// --- ORDER CHANGE ---
orderSelect.addEventListener('change', () => {
  const cardsObj = window.cards;
  const cardsPerPage = cardCols * cardRows;
  totalPages = Math.ceil(Object.keys(cardsObj).length / cardsPerPage);

  if(orderSelect.value === 'sequential') {

    rangeLabel.style.display = 'inline-block';
    pagesLabel.style.display = 'none';

    pageStartInput.value = 1;
    pageEndInput.value = totalPages;
    pageStartInput.max = totalPages;
    pageEndInput.max = totalPages;

  } 
  else if(orderSelect.value === 'random') {

    pagesLabel.style.display = 'inline-block';
    rangeLabel.style.display = 'none';

    populatePageSelect(); // 👈 builds dropdown
  }

  previewBtn.disabled = false;
  downloadBtn.disabled = false;
});

// --- VALIDATE PAGE INPUTS ---
pageStartInput.addEventListener('input', () => {
  let val=parseInt(pageStartInput.value)||1;
  val=Math.max(1, Math.min(val,totalPages));
  pageStartInput.value=val;
  if(parseInt(pageEndInput.value)<val) pageEndInput.value=val;
});
pageEndInput.addEventListener('input', () => {
  let val=parseInt(pageEndInput.value)||totalPages;
  val=Math.max(1, Math.min(val,totalPages));
  pageEndInput.value=val;
  if(parseInt(pageStartInput.value)>val) pageStartInput.value=val;
});

// --- PREVIEW FUNCTION ---
function renderPreview() {
  const container = document.getElementById('pagePreview');
  container.innerHTML = '';
  const cardsObj = window.cards;
  const cardArray = Object.values(cardsObj);

  let displayArray = [...cardArray];
  if(orderSelect.value==='random') displayArray.sort(()=>Math.random()-0.5);
  finalCardOrder = displayArray;

  const cardsPerPage = cardCols * cardRows;

  let startPage=1, endPage=Math.ceil(cardArray.length/cardsPerPage);
  if(orderSelect.value==='sequential'){
    startPage = parseInt(pageStartInput.value)||1;
    endPage = parseInt(pageEndInput.value)||endPage;
  } else {
    endPage = parseInt(numPagesInput.value)||1;
  }

  let cardsPrinted = (startPage-1)*cardsPerPage;


const pageDiv = document.createElement('div');
pageDiv.className = 'pageGrid';

// orientation
if (layoutSelect.value === '2x5') {
  pageDiv.classList.add('portrait');
} else {
  pageDiv.classList.add('landscape');
}
// ------------------

  // Set dynamic grid
  pageDiv.style.gridTemplateColumns = `repeat(${cardCols}, 1fr)`;
  pageDiv.style.gridTemplateRows = `repeat(${cardRows}, 1fr)`;

  for(let i=0;i<cardsPerPage;i++){
    const card = displayArray[cardsPrinted];
    if(!card) break;

    const div = document.createElement('div');
    div.className = `cardPreview style-${styleSelect.value}`;
    div.dataset.layout = layoutSelect.value;

    // Card code
    const codeDiv = document.createElement('div');
    codeDiv.textContent = card.code;
    codeDiv.style.textAlign = 'center';
    codeDiv.style.fontWeight = 'bold';

    // Dynamic font sizing
    if(layoutSelect.value==='1x2') codeDiv.style.fontSize='18px';
    else if(layoutSelect.value==='2x3') codeDiv.style.fontSize='14px';
    else if(layoutSelect.value==='2x5') codeDiv.style.fontSize='14px';
    else if(layoutSelect.value==='3x4') codeDiv.style.fontSize='12px';
    else if(layoutSelect.value==='4x5') codeDiv.style.fontSize='10px';

    div.appendChild(codeDiv);

    // Bingo table
    const table = document.createElement('table');
    for(const row of card.numbers){
      const tr = document.createElement('tr');
      for(const n of row){
        const td = document.createElement('td');
        td.textContent = n===null?'':n;
        td.style.fontWeight='bold';
        td.style.textAlign='center';
        td.style.verticalAlign='middle';

        // Dynamic font for table cells
        if(layoutSelect.value==='1x2') td.style.fontSize='20px';
        else if(layoutSelect.value==='2x3') td.style.fontSize='12px';
        else if(layoutSelect.value==='2x5') td.style.fontSize='14px';
        else if(layoutSelect.value==='3x4') td.style.fontSize='12px';
        else if(layoutSelect.value==='4x5') td.style.fontSize='10px';

        tr.appendChild(td);
      }
      table.appendChild(tr);
    }

    div.appendChild(table);
    pageDiv.appendChild(div);
    cardsPrinted++;
  }

  container.appendChild(pageDiv);


}

// --- PDF DOWNLOAD ---
downloadBtn.addEventListener('click', () => {
  const { jsPDF } = window.jspdf;

  const pdfOrientation = (layoutSelect.value === '2x5') ? 'portrait' : 'landscape';
  const pdf = new jsPDF(pdfOrientation, 'mm', 'a4');

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const padding = 5;

  const cardsPerPage = cardCols * cardRows;
  const cardWidth = (pageWidth - (cardCols + 1) * padding) / cardCols;
  const cardHeight = (pageHeight - (cardRows + 1) * padding) / cardRows;

  let startPage = 1,
      endPage = Math.ceil(finalCardOrder.length / cardsPerPage);
  if (orderSelect.value === 'sequential') {
    startPage = parseInt(pageStartInput.value) || 1;
    endPage = parseInt(pageEndInput.value) || endPage;
  } else {
    endPage = parseInt(numPagesInput.value) || 1;
  }

  let cardsPrinted = (startPage - 1) * cardsPerPage;

  for (let p = startPage; p <= endPage; p++) {
    let x = padding, y = padding;

    for (let i = 0; i < cardsPerPage; i++) {
      const card = finalCardOrder[cardsPrinted];
      if (!card) break;

      const style = pdfStyleMap[styleSelect.value] || pdfStyleMap.plain;

      // Draw card background
      pdf.setFillColor(...style.bg);
      pdf.setDrawColor(...style.cardBorder);
      pdf.rect(x, y, cardWidth, cardHeight, 'FD');

      // --- Draw card code (first-row header) ---
      pdf.setFont(undefined, 'bold');
      pdf.setFontSize(layoutSelect.value === '1x2' ? 18 :
                      layoutSelect.value === '2x3' ? 14 :
                      layoutSelect.value === '2x5' ? 14 :
                      layoutSelect.value === '3x4' ? 12 : 10);

      let headerColor = [...style.text]; // default
      // Override header color based on preview styles
      switch(styleSelect.value){
        case 'christmas': headerColor = [179,0,0]; break;
        case 'easter': headerColor = [122,75,148]; break;
        case 'neon': headerColor = [158,158,158]; break;
        case 'halloween': headerColor = [178,102,255]; break;
        case 'retro': headerColor = [196,122,44]; break;
        case 'gold': headerColor = [140,109,31]; break;
        case 'kids': headerColor = [255,111,145]; break;
        case 'minimal': headerColor = [68,68,68]; break;
        case 'casino': headerColor = [212,175,55]; break;
      }

      pdf.setTextColor(...headerColor);
      pdf.text(card.code, x + cardWidth / 2, y + 6, {align:'center'});

      // --- Draw table cells ---
      const rows = card.numbers.length;
      const colsInCard = card.numbers[0].length;
      const tableTop = y + 10;
      const tableHeight = cardHeight - 12;
      const cellWidth = cardWidth / colsInCard;
      const cellHeight = tableHeight / rows;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < colsInCard; c++) {
          const num = card.numbers[r][c];
          const cellX = x + c * cellWidth;
          const cellY = tableTop + r * cellHeight;

          // Cell border
          pdf.setDrawColor(...style.grid);
          pdf.rect(cellX, cellY, cellWidth, cellHeight);

          // Number text
          if (num !== null) {
            pdf.setTextColor(...style.text);
            pdf.setFontSize(layoutSelect.value === '1x2' ? 20 :
                            layoutSelect.value === '2x3' ? 12 :
                            layoutSelect.value === '2x5' ? 14 :
                            layoutSelect.value === '3x4' ? 12 : 10);
            pdf.text(String(num), cellX + cellWidth/2, cellY + cellHeight/2, {align:'center', baseline:'middle'});
          }
        }
      }

      // Advance x/y for next card
      x += cardWidth + padding;
      if ((i+1) % cardCols === 0) { x = padding; y += cardHeight + padding; }
      cardsPrinted++;
    }

    if (p < endPage) pdf.addPage();
  }

  pdf.save('bingo_cards.pdf');
});

previewBtn.addEventListener('click', renderPreview);
window.addEventListener('DOMContentLoaded', () => {
  styleSelect.value = 'plain';
});

styleSelect.addEventListener('change', () => {
  if (!previewBtn.disabled) {
    renderPreview();
  }
});

layoutSelect.addEventListener('change', () => {
  if (!layoutSelect.value) return;

  [cardCols, cardRows] = layoutSelect.value.split('x').map(Number);

  updatePageControls();
  renderPreview();
});

orderSelect.addEventListener('change', () => {
  updatePageControls();
  renderPreview();
});
</script>
</body>
</html>
